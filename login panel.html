<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Perfect Network | برفكت نيتورك</title>
    <link rel="icon" href="https://h.top4top.io/p_321693qxh1.png">
    <link rel="apple-touch-icon" href="https://h.top4top.io/p_321693qxh1.png">
    <meta name="description" content="برفكت نيتورك للحياة الواقعية">
    <meta name="keywords" content="roleplay,game,MTASA,GTA,حياة واقعية,رول بلاي,لعبة,عربي,برفكت نيتورك,الأفضل">
    
    <!-- روابط المكتبات الخارجية -->
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.5.1/css/all.css">
    <link rel="stylesheet" href="https://site-assets.fontawesome.com/releases/v6.5.1/css/sharp-light.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css">

    <!-- ربط ملف CSS -->
    <link rel="stylesheet" href="login panel.css">
</head>
<body>
    <div class="logo-container">
        <img src="https://h.top4top.io/p_321693qxh1.png" alt="Logo">
    </div>
    
    <div class="login-container">
        <div class="login-box">
            <h2>Login to Continue</h2>
            <form id="login-form" onsubmit="return checkLogin(event)">
                <div class="input-box">
                    <input type="text" id="login-username" name="username" required>
                    <label>USERNAME OR EMAIL</label>
                </div>
                <div class="input-box">
                    <input type="password" id="login-password" name="password" required>
                    <label>PASSWORD</label>
                </div>
                <p id="error-message" style="color: red; display: none;">عفوا كلمه السر او الحساب خاطئ برجاء التواصل مع احد الاداريين</p>
                <button type="submit" id="login-button">LOGIN</button>
                <a href="#" class="forgot-password">FORGOT PASSWORD?</a>
                <p>Don't have an account? <a href="#" id="show-register">Sign Up</a></p>

                <!-- زر تسجيل دخول Discord -->
                <div id="discord-login-button" class="discord-btn">
                    <i class="fa-brands fa-discord"></i>
                    <span>Sign in with Discord</span>
                </div>
            </form>
            <p id="success-message" style="color: green; display: none;">تم تسجيل الدخول بنجاح، أهلاً بعودتك يا سيدي</p>
        </div>
    </div>
    
    <script>
        let isLoggedIn = false;  // حالة تسجيل الدخول

        function toggleLoginLogout() {
            const loginButton = document.getElementById("login-button");
            if (isLoggedIn) {
                loginButton.textContent = "LOGIN";  // إرجاع النص إلى تسجيل دخول
                isLoggedIn = false;
                document.getElementById("success-message").style.display = "none"; // إخفاء رسالة النجاح
            } else {
                loginButton.textContent = "LOGOUT";  // تغيير النص إلى تسجيل خروج
                isLoggedIn = true;
                document.getElementById("success-message").style.display = "block"; // عرض رسالة النجاح
            }
        }

        function checkLogin(event) {
            event.preventDefault();  // منع إرسال النموذج

            // تحقق من بيانات تسجيل الدخول هنا (مثال: التحقق من المستخدم وكلمة المرور)
            const username = document.getElementById("login-username").value;
            const password = document.getElementById("login-password").value;

            if (username === "user" && password === "password") {
                // في حال كان تسجيل الدخول ناجح
                toggleLoginLogout();  // تغيير النص
            } else {
                // في حال كان هناك خطأ في البيانات
                document.getElementById("error-message").style.display = "block";
            }
        }
    </script>
    
</body>
</html>
